<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0010;overflow:hidden;width:100%;height:100vh;font-family:Georgia,serif;}
canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
#ss{position:fixed;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;}
.slide{position:absolute;display:flex;align-items:center;justify-content:center;opacity:0;}
.slide.active{opacity:1;animation:sIn 1s ease forwards;}
.slide.out{animation:sOut 0.9s ease forwards;}
@keyframes sIn{from{opacity:0;transform:scale(0.85) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes sOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.06)}}
.frame{padding:12px 12px 48px;background:white;box-shadow:0 0 0 3px #ffd700,0 20px 60px rgba(0,0,0,0.9),0 0 100px rgba(255,100,200,0.3);transform:rotate(var(--r));position:relative;}
.frame img{display:block;max-width:60vw;max-height:60vh;object-fit:contain;}
.cap{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-style:italic;font-size:16px;color:#cc4488;}
#tit{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#h1{font-size:clamp(32px,7vw,90px);font-weight:bold;background:linear-gradient(135deg,#ffd700,#ff69b4,#ffd700,#ff9500);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gr 4s ease infinite,pu 3s ease-in-out infinite;filter:drop-shadow(0 0 25px rgba(255,180,0,0.7));}
@keyframes gr{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
#h2{font-style:italic;font-size:clamp(16px,3.5vw,44px);color:#ffe8f0;margin-top:8px;letter-spacing:3px;animation:gw 2s ease-in-out infinite alternate;}
@keyframes gw{from{text-shadow:0 0 20px rgba(255,100,200,0.8)}to{text-shadow:0 0 40px rgba(255,200,50,1),0 0 80px rgba(255,100,200,0.7)}}
#h3{font-weight:bold;font-size:clamp(22px,4.5vw,60px);color:white;margin-top:12px;text-shadow:0 0 25px #ff69b4,0 0 50px #ff1493;animation:bo 1.6s ease-in-out infinite;}
@keyframes bo{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
#foot{position:fixed;bottom:0;left:0;right:0;z-index:20;height:55px;display:flex;align-items:center;justify-content:center;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);}
#ft{font-style:italic;font-size:clamp(13px,2vw,26px);color:#ffd700;text-shadow:0 0 15px #ffd700;animation:fp 2.5s ease-in-out infinite;}
@keyframes fp{0%,100%{opacity:1}50%{opacity:0.55}}
#dots{position:fixed;top:14px;right:16px;z-index:30;display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);transition:all 0.3s;}
.dot.on{background:#ffd700;box-shadow:0 0 7px #ffd700;transform:scale(1.5);}
.heart{position:fixed;z-index:5;animation:fh var(--d) ease-in infinite var(--dl);opacity:0;bottom:-30px;left:var(--l);font-size:var(--s);}
@keyframes fh{0%{opacity:0;transform:translateY(0);bottom:-30px}10%{opacity:1}90%{opacity:0.5}100%{opacity:0;transform:translateY(-110vh) rotate(25deg)}}
.fw{position:fixed;z-index:4;pointer-events:none;}
.sp{position:absolute;width:4px;height:4px;border-radius:50%;animation:sk var(--t) ease-out forwards;}
@keyframes sk{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}
#hint{position:fixed;top:14px;left:16px;z-index:30;color:rgba(255,255,255,0.55);font-size:13px;font-style:italic;}
</style>
</head>

var CAPTIONS=["Our little bookworm \ud83d\udcda", "Future race car driver \ud83c\udfce\ufe0f", "Grandpa's little princess \ud83d\udc95", "Curious about everything \ud83c\udf1f", "Jumping for joy! \ud83c\udf89", "Dancing superstar \u2728", "Wendy with flowers \ud83c\udf38", "A flower in the meadow \ud83c\udf3c", "Ice cream lover \ud83c\udf66", "So proud of you! \ud83c\udf3f", "Feeding the pigeons \ud83d\udd4a\ufe0f", "Summer sunshine girl \u2600\ufe0f", "Mountain explorer \ud83c\udfd4\ufe0f", "Road trip adventures \ud83d\ude97", "Bigger than the ice cream! \ud83d\ude04", "Big brother & little sister \ud83d\udc9b", "Baby Wendy \ud83d\udc95", "First steps into the world \ud83e\udde7", "Little mermaid at the beach \ud83c\udf0a"];
var COLORS=['#ffd700','#ff69b4','#ff1493','#00bfff','#7fff00','#ff6347','#da70d6','#ffa500'];
var HEARTS=['💕','💖','💗','💝','🌸','⭐','✨','🎀','💫','🎈'];

// Stars
for(var i=0;i<40;i++){
  var s=document.createElement('div');
  s.style.cssText='position:fixed;border-radius:50%;background:gold;z-index:2;'
    +'left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;'
    +'width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px;'
    +'animation:fp '+(2+Math.random()*4)+'s ease-in-out infinite '+(-Math.random()*4)+'s;';
  document.body.appendChild(s);
}

// Hearts
for(var i=0;i<12;i++){
  var h=document.createElement('div'); h.className='heart';
  h.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];
  h.style.setProperty('--l',Math.random()*100+'%');
  h.style.setProperty('--d',(5+Math.random()*8)+'s');
  h.style.setProperty('--dl',(-Math.random()*10)+'s');
  h.style.setProperty('--s',(16+Math.random()*18)+'px');
  document.body.appendChild(h);
}

// Confetti
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
cv.width=window.innerWidth; cv.height=window.innerHeight;
var pcs=[];
for(var i=0;i<90;i++) pcs.push({
  x:Math.random()*cv.width, y:Math.random()*cv.height-cv.height,
  w:5+Math.random()*7, h:9+Math.random()*11,
  c:COLORS[Math.floor(Math.random()*COLORS.length)],
  r:Math.random()*Math.PI*2, rs:(Math.random()-0.5)*0.15,
  vx:(Math.random()-0.5)*1.5, vy:1.2+Math.random()*2, a:0.65+Math.random()*0.35
});
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  pcs.forEach(function(p){
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
    ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.r+=p.rs;
    if(p.y>cv.height){p.y=-15;p.x=Math.random()*cv.width;}
  });
  requestAnimationFrame(draw);
}
draw();

// Fireworks
function fw(){
  var el=document.createElement('div'); el.className='fw';
  el.style.left=(15+Math.random()*70)+'%'; el.style.top=(8+Math.random()*55)+'%';
  var c=COLORS[Math.floor(Math.random()*COLORS.length)];
  for(var i=0;i<16;i++){
    var sp=document.createElement('div'); sp.className='sp';
    var a=(i/16)*Math.PI*2,d=60+Math.random()*50;
    sp.style.cssText='background:'+c+';box-shadow:0 0 5px '+c+';';
    sp.style.setProperty('--x',Math.cos(a)*d+'px');
    sp.style.setProperty('--y',Math.sin(a)*d+'px');
    sp.style.setProperty('--t',(0.7+Math.random()*0.5)+'s');
    el.appendChild(sp);
  }
  document.body.appendChild(el);
  setTimeout(function(){el.parentNode&&el.parentNode.removeChild(el);},1500);
}
setInterval(fw,2500); setTimeout(fw,300); setTimeout(fw,800);

// Slideshow
var ss=document.getElementById('ss'), dotsEl=document.getElementById('dots');
var cur=0, curSlide=null;
var rots=PHOTOS.map(function(){return (Math.random()-0.5)*5;});
for(var i=0;i<PHOTOS.length;i++){
  var d=document.createElement('div'); d.className='dot'+(i===0?' on':'');
  dotsEl.appendChild(d);
}
function showSlide(idx){
  var dts=dotsEl.querySelectorAll('.dot');
  for(var i=0;i<dts.length;i++) dts[i].className='dot'+(i===idx?' on':'');
  if(curSlide){
    curSlide.classList.remove('active'); curSlide.classList.add('out');
    var old=curSlide; setTimeout(function(){old.parentNode&&old.parentNode.removeChild(old);},1100);
  }
  var slide=document.createElement('div'); slide.className='slide';
  var frame=document.createElement('div'); frame.className='frame';
  frame.style.setProperty('--r',rots[idx]+'deg');
  var img=document.createElement('img'); img.src=PHOTOS[idx]; img.alt='Wendy';
  var cap=document.createElement('div'); cap.className='cap';
  cap.textContent=CAPTIONS[idx]||'';
  frame.appendChild(img); frame.appendChild(cap); slide.appendChild(frame);
  ss.appendChild(slide);
  requestAnimationFrame(function(){requestAnimationFrame(function(){slide.classList.add('active');});});
  curSlide=slide; cur=idx;
}
showSlide(0);
setInterval(function(){showSlide((cur+1)%PHOTOS.length);},4500);

// Music
var acStarted=false;
function startMusic(){
  if(acStarted) return; acStarted=true;
  document.getElementById('hint').style.display='none';
  try{
    var AC=window.AudioContext||window.webkitAudioContext, ac=new AC();
    function note(f,t,d,v){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type='sine'; o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v||0.22,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+d);
      o.start(t); o.stop(t+d+0.1);
    }
    var n=ac.currentTime;
    [[261.63,0,0.3],[261.63,0.35,0.15],[293.66,0.5,0.5],[261.63,1.1,0.5],[349.23,1.7,0.5],[329.63,2.3,1.0],

     [466.16,10.7,0.3],[466.16,11.05,0.15],[440.00,11.2,0.5],[349.23,11.8,0.5],[392.00,12.4,0.5],[349.23,13.0,1.5]
    ].forEach(function(x){note(x[0],n+x[1],x[2],0.22);});
    [[196.00,0,1.2],[174.61,1.0,1.2],[196.00,2.3,1.0],[196.00,3.5,1.2],[174.61,4.5,1.2],[196.00,5.8,1.0],
     [261.63,7.0,1.2],[220.00,8.0,1.2],[174.61,9.2,1.2],[233.08,10.7,1.2],[220.00,11.8,2.5]
    ].forEach(function(x){note(x[0],n+x[1],x[2],0.09);});
  }catch(e){}
}
document.body.addEventListener('click',startMusic);
setTimeout(function(){try{startMusic();}catch(e){}},500);
